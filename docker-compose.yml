services:
  api:
    build: .
    command: uv run uvicorn src.game_selection.api_data:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  forms:
    build: .
    command: uv run streamlit run app/app_forms.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data

  select:
    build: .
    command: uv run streamlit run app/app_select.py --server.port 8502 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8502:8502"
    environment:
      - API_URL=http://api:8000
    volumes:
      - ./data:/app/data
    depends_on:
      - api
